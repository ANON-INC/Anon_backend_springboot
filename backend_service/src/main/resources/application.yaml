server:
  port: 8080

# JWT Configuration - property names match JwtService exactly
jwt:
  secret-key: ${JWT_SECRET_KEY}
  expiration-ms: 3600000 # 1 hour in milliseconds

# Database configuration
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/Anon
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  
  # SMTP configuration - fixed duplicate port issue
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true